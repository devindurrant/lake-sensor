[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  milesburton/DallasTemperature @ ^3.11.0
  paulstoffregen/OneWire @ ^2.3.8

; Mozilla CA bundle for TLS server validation (see cert/README.md to regen).
; Embedded symbol: _binary_cert_x509_crt_bundle_bin_start
board_build.embed_files =
  cert/x509_crt_bundle.bin

build_flags =
  -DCORE_DEBUG_LEVEL=0

; -------------------------------------------------------------------------
; Development build: enables serial logging in main.cpp.
; Flash with: pio run -e dev -t upload
; -------------------------------------------------------------------------
[env:dev]
extends = env:seeed_xiao_esp32c3
build_flags =
  -DCORE_DEBUG_LEVEL=5
  -DDEBUG
